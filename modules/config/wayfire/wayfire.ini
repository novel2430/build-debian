[wm-actions]
minimize = none
send_to_back = none
toggle_always_on_top = none
toggle_fullscreen = <super> KEY_F
toggle_maximize = <super> KEY_M
toggle_showdesktop = none
toggle_sticky = 

[wobbly]
friction = 3
grid_resolution = 6
spring_k = 8

[workarounds]
