binding_right = <ctrl> <super> KEY_RIGHT | <ctrl> <super> KEY_L
binding_up = <ctrl> <super> KEY_UP | <ctrl> <super> KEY_K
duration = 300
gap = 20
send_win_down = 
send_win_last = 
send_win_left = 
send_win_right = 
send_win_up = 
