[alpha]
min_value = 0.100000
modifier = <alt> <super>

[animate]
close_animation = zoom
duration = 300
enabled_for = '(type equals "toplevel" | (type equals "x-or" & focusable equals true))'
fade_duration = 300
fade_enabled_for = type equals "overlay"
fire_duration = 300
fire_enabled_for = none
fire_particle_size = 16.000000
fire_particles = 2000
open_animation = zoom
random_fire_color = false
startup_duration = 300
zoom_duration = 300
zoom_enabled_for = none

[autostart]
autostart_wf_shell = false
gamma = wlsunset
# idle = my-swayidle
my_autostart = wayfire-autostart
outputs = kanshi

[blur]
blur_by_default = app_id is "foot"
bokeh_degrade = 1
bokeh_iterations = 15
bokeh_offset = 5
box_degrade = 1
box_iterations = 2
box_offset = 1
gaussian_degrade = 1
gaussian_iterations = 2
gaussian_offset = 1
kawase_degrade = 3
kawase_iterations = 2
kawase_offset = 1.7
method = kawase
saturation = 1.0
toggle = none

[command]
binding_clipboard = <super> KEY_C
binding_launcher = <super> KEY_D
binding_lock = <super> <shift> KEY_L
binding_mute = KEY_MUTE
binding_run_launcher = <super> KEY_R
binding_screenshot = KEY_SYSRQ
binding_screenshot_interactive = <super> KEY_SYSRQ | <super> <shift> KEY_S
binding_terminal = <super> KEY_ENTER
binding_web_browser = <super> <shift> KEY_F
binding_waybar = <super> <shift> KEY_B
binding_power_menu = <super> <shift> KEY_P
binding_audio_play = KEY_PLAYPAUSE
binding_audio_next = KEY_NEXTSONG
binding_audio_prev = KEY_PREVIOUSSONG
command_clipboard = wlroot-clipboard
command_launcher = rofi -show drun
command_lock = my-swaylock idle
command_mute = my-volume mute
command_run_launcher = rofi -show run
command_screenshot = grim-slurp-screenshot full
command_screenshot_interactive = grim-slurp-screenshot
command_terminal = wezterm
command_volume_down = my-volume down
command_volume_up = my-volume up
command_light_up = brightnessctl set 10%+
command_light_down = brightnessctl set 10%-
command_audio_play = playerctl play-pause
command_audio_next = playerctl next
command_audio_prev = playerctl previous
command_web_browser = firefox
command_waybar = killall waybar; ~/.config/wayfire/bar-run.sh
command_power_menu = rofi-power-menu
repeatable_binding_volume_down = KEY_VOLUMEDOWN
repeatable_binding_volume_up = KEY_VOLUMEUP
repeatable_binding_light_up = KEY_BRIGHTNESSUP
repeatable_binding_light_down = KEY_BRIGHTNESSDOWN

[core]
close_top_view = <super> KEY_Q | <alt> KEY_F4
focus_button_with_modifiers = false
focus_buttons = BTN_LEFT | BTN_MIDDLE | BTN_RIGHT
focus_buttons_passthrough = true
max_render_time = -1
plugins = alpha animate autostart command decoration expo fast-switcher foreign-toplevel grid gtk-shell idle move oswitch place resize switcher vswitch wayfire-shell window-rules wm-actions input-method-v1 zoom scale wobbly blur session-lock ipc ipc-rules
preferred_decoration_mode = client
transaction_timeout = 100
vheight = 3
vwidth = 3
xwayland = true

[cube]
activate = <alt> <ctrl> BTN_LEFT
background = \#1A1A1AFF
background_mode = simple
cubemap_image = 
deform = 0
initial_animation = 350
light = true
rotate_left = none
rotate_right = none
skydome_mirror = true
skydome_texture = 
speed_spin_horiz = 0.02
speed_spin_vert = 0.02
speed_zoom = 0.07
zoom = 0.1

[decoration]
active_color = \#5e936cff
border_size = 2
button_order = minimize maximize close
font = Hack Nerd Font
ignore_views = none
inactive_color = \#3f3f36ff
title_height = 22

[expo]
background = \#5E936CFF
duration = 300
inactive_brightness = 0.7
keyboard_interaction = true
offset = 5
select_workspace_1 = KEY_1
select_workspace_2 = KEY_2
select_workspace_3 = KEY_3
select_workspace_4 = KEY_4
select_workspace_5 = KEY_5
select_workspace_6 = KEY_6
select_workspace_7 = KEY_7
select_workspace_8 = KEY_8
select_workspace_9 = KEY_9
toggle = <super>
transition_length = 200

[extra-gestures]
close_fingers = 20
move_delay = 500
move_fingers = 3

[fast-switcher]
activate = <super> KEY_J
activate_backward = <super> KEY_K

[fisheye]
radius = 450
toggle = <ctrl> <super> KEY_F
zoom = 7

[grid]
duration = 500
restore = <super> KEY_KP0
slot_b = <super> KEY_DOWN
slot_bl = <super> KEY_KP1
slot_br = <super> KEY_KP3
slot_c = <super> KEY_KP5
slot_l = <super> KEY_LEFT | <super> KEY_KP4
slot_r = <super> KEY_RIGHT | <super> KEY_KP6
slot_t = <super> KEY_UP
slot_tl = <super> KEY_KP7
slot_tr = <super> KEY_KP9
type = wobbly

[idle]
cube_max_zoom = 1.5
cube_rotate_speed = 1
cube_zoom_speed = 0
disable_on_fullscreen = true
dpms_timeout = 0
screensaver_timeout = 0
toggle = none

[input]
click_method = default
cursor_size = 15
cursor_theme = default
disable_touchpad_while_mouse = false
disable_touchpad_while_typing = false
drag_lock = false
gesture_sensitivity = 1
kb_capslock_default_state = false
kb_numlock_default_state = false
kb_repeat_delay = 300
kb_repeat_rate = 50
left_handed_mode = false
middle_emulation = false
modifier_binding_timeout = 400
mouse_accel_profile = default
mouse_cursor_speed = 0
mouse_scroll_speed = 1
natural_scroll = false
scroll_method = default
tablet_motion_mode = default
tap_to_click = true
touchpad_accel_profile = default
touchpad_cursor_speed = 0
touchpad_scroll_speed = 1
xkb_layout = us
xkb_model = 
xkb_options = 
xkb_rules = evdev
xkb_variant = 

[input-device]
output = 

[invert]
preserve_hue = false
toggle = <super> KEY_I

[move]
activate = <super> BTN_LEFT
enable_snap = true
enable_snap_off = true
join_views = false
preview_base_border = \#5e936c0f
preview_base_color = \#5e936c0f
preview_border_width = 0
quarter_snap_threshold = 50
snap_off_threshold = 10
snap_threshold = 10
workspace_switch_after = -1

[oswitch]
next_output = <super> KEY_O
next_output_with_win = <shift> <super> KEY_O
prev_output = 
prev_output_with_win = 

[output]
depth = 8
mode = auto
position = auto
scale = 1.0
transform = normal
vrr = false

[place]
mode = center

[preserve-output]
last_output_focus_timeout = 10000

[resize]
activate = <super> BTN_RIGHT
activate_preserve_aspect = none

[scale]
allow_zoom = false
bg_color = \#3E5F44FF
duration = 300
inactive_alpha = 0.6
include_minimized = true
middle_click_close = false
minimized_alpha = 0.45
outer_margin = 0
spacing = 30
text_color = \#ECEFF4FF
title_font_size = 20
title_overlay = all
title_position = center
toggle = <alt> KEY_SPACE
toggle_all = 

[switcher]
next_view = <alt> KEY_TAB
prev_view = <alt> <shift> KEY_TAB
speed = 200
view_thumbnail_rotation = 30
view_thumbnail_scale = 1.0

[vswipe]
background = \#1A1A1AFF
delta_threshold = 24
duration = 300
enable_free_movement = false
enable_horizontal = true
enable_smooth_transition = false
enable_vertical = true
fingers = 4
gap = 32
speed_cap = 0.05
speed_factor = 256
threshold = 0.35

[vswitch]
